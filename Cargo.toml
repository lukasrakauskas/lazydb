[package]
name = "lazydb"
version = "0.1.0"
edition = "2024"

[dependencies]
ratatui = "0.30"
crossterm = "0.28"
mysql = { version = "25", default-features = false, features = ["minimal-rust"] }
postgres = { version = "0.19", default-features = false }
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
anyhow = "1"
neo_frizbee = "0.10"

[lints.clippy]
all = { level = "deny", priority = -1 }
