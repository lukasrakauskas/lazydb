# cargo-deny config for lazydb.
# CI (EmbarkStudios/cargo-deny-action@v2) is the verifier of record.
# ponytail: rustls-webpki v0.101.x vulns (RUSTSEC-2026-0103/0104) from
# tiberius→rustls 0.21 and rustls-pemfile (unmaintained) from
# mysql→rustls-tls are not reachable — lazydb doesn't parse CRLs or
# validate TLS chains. Allowlisted until upstream upgrades.

[advisories]
ignore = [
    "RUSTSEC-2026-0103",
    "RUSTSEC-2026-0104",
]
unmaintained = "none"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
